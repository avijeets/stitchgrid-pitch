<style>
  :root{ --paper:#FAF8F5; --ink:#2A2623; --terracotta:#C4613A; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}

  /* Full-screen PDF (desktop) */
  .pdf{position:fixed;inset:0;width:100%;height:100%;border:0;background:var(--ink);z-index:1}

  /* Fallback sits behind the PDF; becomes the view on mobile, where inline PDF rendering is unreliable */
  .fallback{position:fixed;inset:0;z-index:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;text-align:center;color:var(--paper);padding:28px}
  .fallback .mark{font-weight:800;font-size:15px;letter-spacing:.02em}
  .fallback .mark .dot{color:var(--terracotta)}
  .fallback h1{font-size:22px;font-weight:700;line-height:1.2}
  .fallback p{color:rgba(250,248,245,.7);font-size:14px;max-width:30em;line-height:1.5}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 20px;border-radius:999px;
    background:var(--paper);color:var(--ink);text-decoration:none;font-size:13px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase}

  @media (max-width:820px){
    .pdf{display:none}
    .fallback{z-index:2}
  }
</style>
</head>
<body>
  <div class="fallback">
    <div class="mark">stitchgrid<span class="dot">.</span></div>
    <h1>Pre-Seed Investor Deck</h1>
    <p>Tap below to open the deck.</p>
    <a class="btn" href="./StitchGrid-Pre-Seed-Investor-Presentation.pdf" onclick="if(window.va)va('event',{name:'Open deck'})">View the deck</a>
  </div>

  <iframe class="pdf" src="./StitchGrid-Pre-Seed-Investor-Presentation.pdf#view=FitH" title="StitchGrid Pre-Seed Deck" loading="eager"></iframe>
</body>
